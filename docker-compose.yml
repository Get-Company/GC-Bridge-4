services:
  db:
    image: postgres:16-alpine
    container_name: gc_bridge_4_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gc_bridge_4}
      POSTGRES_USER: ${POSTGRES_USER:-gc_bridge_4}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gc_bridge_4}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gc_bridge_4} -d $${POSTGRES_DB:-gc_bridge_4}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gc_bridge_4_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gc-bridge-4:latest
    container_name: gc_bridge_4_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-true}
      DJANGO_USE_X_FORWARDED_PROTO: ${DJANGO_USE_X_FORWARDED_PROTO:-true}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOGS_ROOT: /app/tmp/logs
      DB_BACKUP_DIR: /app/tmp/backups
      MICROTECH_GRAPHQL_URL: ${MICROTECH_GRAPHQL_URL:-http://10.0.0.5:8888/graphql/}
      RUN_DJANGO_CHECK: ${RUN_DJANGO_CHECK:-true}
      RUN_COLLECTSTATIC: ${RUN_COLLECTSTATIC:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    command: >
      gunicorn GC_Bridge_4.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-3}
      --timeout ${GUNICORN_TIMEOUT:-120}
      --access-logfile -
      --error-logfile -
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - applogs:/app/tmp/logs
      - backups:/app/tmp/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    image: gc-bridge-4:latest
    container_name: gc_bridge_4_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-2}
      LOGS_ROOT: /app/tmp/logs
      MICROTECH_GRAPHQL_URL: ${MICROTECH_GRAPHQL_URL:-http://10.0.0.5:8888/graphql/}
      RUN_DJANGO_CHECK: "false"
      RUN_COLLECTSTATIC: "false"
      RUN_MIGRATIONS: "false"
    command: celery -A GC_Bridge_4 worker --loglevel=INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - media:/app/media
      - applogs:/app/tmp/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: gc-bridge-4:latest
    container_name: gc_bridge_4_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOGS_ROOT: /app/tmp/logs
      MICROTECH_GRAPHQL_URL: ${MICROTECH_GRAPHQL_URL:-http://10.0.0.5:8888/graphql/}
      RUN_DJANGO_CHECK: "false"
      RUN_COLLECTSTATIC: "false"
      RUN_MIGRATIONS: "false"
    command: celery -A GC_Bridge_4 beat --loglevel=INFO
    volumes:
      - media:/app/media
      - applogs:/app/tmp/logs
      - celerybeat:/app/tmp/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: gc_bridge_4_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro
      - media:/media:ro
    depends_on:
      - web

  adminer:
    image: adminer:4
    container_name: gc_bridge_4_adminer
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT:-8082}:8080"

volumes:
  pgdata:
  redisdata:
  staticfiles:
  media:
  applogs:
  celerybeat:
  backups:
