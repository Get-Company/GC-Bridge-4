name: Deploy to Ubuntu Server

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Deploy Docker Compose stack
        shell: bash
        env:
          DEPLOY_TAG: ${{ github.ref_name }}
          APP_DIR: /home/buchner/deploy/GC-Bridge-4
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TAG:-}" ]; then
            echo "DEPLOY_TAG is not set" >&2
            exit 1
          fi

          cd "$APP_DIR"
          mkdir -p tmp/logs/monthly/deploy
          LOG_FILE="tmp/logs/monthly/deploy/deploy.$(date +%F).log"

          log() {
            printf '[%s] %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" "$*" | tee -a "$LOG_FILE"
          }

          run_logged() {
            log "Running: $*"
            "$@" 2>&1 | tee -a "$LOG_FILE"
          }

          log "Deploying ${DEPLOY_TAG}"
          run_logged git fetch --force --tags origin
          run_logged git checkout -f "$DEPLOY_TAG"

          deployed_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "$DEPLOY_TAG")"
          
          if [ "$deployed_sha" != "$tag_sha" ]; then
            log "ERROR: checkout failed, HEAD is at '${deployed_sha}', expected tag '${DEPLOY_TAG}' at '${tag_sha}'"
            exit 1
          fi

          printf '%s' "$DEPLOY_TAG" > VERSION

          run_logged docker compose build
          run_logged docker compose up -d --remove-orphans
          run_logged docker compose ps

          log "Deployment ${DEPLOY_TAG} finished"
