{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
  <div class="module" style="max-width: 960px;">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <div class="submit-row">
        <input type="submit" value="Rewrite erzeugen" class="default">
        <a href="{{ changelist_url }}" class="button cancel-link">Zurueck zu den Rewrite Jobs</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
