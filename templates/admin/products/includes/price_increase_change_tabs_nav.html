<div class="rounded-default border border-base-200 bg-base-50/80 p-2 shadow-xs dark:border-base-800 dark:bg-base-900/60">
    <div class="flex flex-wrap gap-2">
        <button
            type="button"
            data-price-increase-tab-button="settings"
            class="js-price-increase-tab-button inline-flex items-center gap-1.5 rounded-default bg-white px-3 py-2 text-sm font-medium text-font-important-light shadow-xs transition-colors hover:bg-base-100 dark:bg-base-950 dark:text-font-important-dark dark:hover:bg-base-900"
        >
            <span class="material-symbols-outlined text-base leading-none">settings</span>
            <span>Einstellungen</span>
        </button>
        {% if price_increase_positions_inline_enabled %}
            <button
                type="button"
                data-price-increase-tab-button="list"
                class="js-price-increase-tab-button inline-flex items-center gap-1.5 rounded-default px-3 py-2 text-sm font-medium text-font-subtle-light transition-colors hover:bg-black/[0.04] hover:text-font-important-light dark:text-font-subtle-dark dark:hover:bg-white/[0.06] dark:hover:text-font-important-dark"
            >
                <span class="material-symbols-outlined text-base leading-none">list_alt</span>
                <span>Preiserhoehungsliste</span>
            </button>
        {% endif %}
    </div>
</div>
