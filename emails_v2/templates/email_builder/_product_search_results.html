{% if query|length < 2 %}
<p class="text-xs text-gray-300">Mindestens 2 Zeichen eingeben.</p>
{% elif products %}
<div class="space-y-1">
  {% for product in products %}
  <form hx-post="{% url 'email_builder:htmx_block_product_add' block.id %}"
        hx-target="#variable-panel"
        hx-swap="innerHTML">
    {% csrf_token %}
    <input type="hidden" name="product_id" value="{{ product.id }}">
    <button type="submit"
            class="w-full text-left border border-gray-100 rounded px-2 py-1.5 text-xs hover:border-indigo-200 hover:bg-indigo-50 transition-colors">
      <span class="font-mono text-indigo-500">{{ product.erp_nr }}</span>
      <span class="text-gray-600">{{ product.name|default:"" }}</span>
    </button>
  </form>
  {% endfor %}
</div>
{% else %}
<p class="text-xs text-gray-300">Keine Produkte gefunden.</p>
{% endif %}
